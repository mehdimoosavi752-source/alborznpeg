services:
  - type: web
    name: allameh-sokhan-site
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: allameh-sokhan-db
          property: connectionString
      - key: ADMIN_EMAIL
        value: admin@asmdi.ir
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_NAME
        value: Site Manager
      - key: RESET_ADMIN_PASSWORD
        value: "false"
      - key: COOKIE_SECURE
        value: "true"
      - key: NODE_ENV
        value: production
      - key: EMAIL_WEBHOOK_URL
        sync: false
      - key: EMAIL_WEBHOOK_TOKEN
        sync: false
      - key: SMS_WEBHOOK_URL
        sync: false
      - key: SMS_WEBHOOK_TOKEN
        sync: false

databases:
  - name: allameh-sokhan-db
    plan: free
    databaseName: allameh_sokhan
    user: allameh
